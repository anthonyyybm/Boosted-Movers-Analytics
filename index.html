<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boosted Movers Analytics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%231a7a4a'/><text y='.9em' font-size='52' font-family='system-ui' font-weight='700' fill='white' x='12' y='68'>BM</text></svg>">
  <style>
    :root {
      --bg:#f4f7f5;--surface:#ffffff;--surface2:#f0f4f2;--border:#e0ece6;
      --text:#1a2e22;--text2:#5a7a68;--text3:#8aaa98;
      --accent:#1a7a4a;--accent-light:#e8f5ee;--accent-text:#0f5c36;
      --danger:#c0392b;--danger-light:#fde8e8;
      --amber:#d97706;--amber-light:#fef3c7;
      --success:#16a34a;--success-light:#dcfce7;
      --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07);
    }
    body.dark {
      --bg:#0f1410;--surface:#161e18;--surface2:#1e2a20;--border:#2a3c2e;
      --text:#e8f0ea;--text2:#7a9a82;--text3:#4a6a52;
      --accent:#22c55e;--accent-light:#1a2e1e;--accent-text:#4ade80;
      --danger:#f87171;--danger-light:#2d1b1b;
      --amber:#fbbf24;--amber-light:#2d2010;
      --success:#22c55e;--success-light:#1a2e1e;
      --shadow:0 1px 4px rgba(0,0,0,.25);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.5;transition:background .2s,color .2s}
    a{color:var(--accent);text-decoration:none}
    button{cursor:pointer;font:inherit;border:none;background:none}
    input,textarea,select{font:inherit}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;transition:background .2s,border-color .2s}
    .topbar-left{display:flex;align-items:center;gap:10px}
    .logo-mark{width:30px;height:30px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:7px;display:flex;align-items:center;justify-content:center;letter-spacing:.5px;flex-shrink:0}
    .logo-text{font-size:13px;font-weight:600;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .time-display{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
    .dark-toggle{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:background .15s}
    .dark-toggle:hover{background:var(--accent-light)}
    .content{padding:16px;max-width:1400px;margin:0 auto}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
    .card-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:10px}
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    @media(max-width:900px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
    .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:4px}
    .metric-val{font-size:22px;font-weight:700;color:var(--text)}
    .metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
    .progress-wrap{background:var(--surface2);border-radius:6px;height:6px;margin:6px 0;overflow:hidden}
    .progress-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .6s ease}
    .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes ttSpin{to{transform:rotate(360deg)}}
    .a-metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
    .a-metric:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
    .a-chg-pos{font-size:11px;font-weight:600;color:var(--success);margin-top:3px}
    .a-chg-neg{font-size:11px;font-weight:600;color:var(--danger);margin-top:3px}
    .a-chg-nil{font-size:11px;color:var(--text3);margin-top:3px}
    .metric-fade-in{animation:fadeIn .4s ease}
    .platform-section{padding-bottom:28px;margin-bottom:4px;border-bottom:1px solid var(--border)}
    .platform-section:last-child{border-bottom:none;padding-bottom:0}
    .platform-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
    .goals-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
    .goals-row{margin-bottom:12px}.goals-row:last-child{margin-bottom:0}
    .goals-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:12px}
    .goals-label{font-size:13px;color:var(--text)}
    .goals-progress{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
    .ag3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
    .ag6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}
    @media(max-width:1100px){.ag6{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:900px){.ag3{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.ag6{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.ag3{grid-template-columns:1fr}}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
    .analytics-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
    .analytics-header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .last-refreshed{font-size:11px;color:var(--text3)}
    .refresh-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border);color:var(--text2);background:var(--surface);cursor:pointer;transition:all .15s}
    .refresh-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
    .refresh-btn.spinning .refresh-icon{display:inline-block;animation:spin .8s linear infinite}
    .refresh-btn:disabled{opacity:.5;cursor:default}
    .data-badge-cached{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber);margin-left:8px;vertical-align:middle}
    .data-badge-live{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:var(--success-light);color:var(--success);border:1px solid var(--success);margin-left:8px;vertical-align:middle}
    .coming-soon-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber);margin-left:8px}
    .platform-section.coming-soon-section{position:relative}
    .coming-soon-overlay{position:absolute;inset:0;background:rgba(244,247,245,.55);border-radius:var(--radius);pointer-events:none;z-index:1}
    body.dark .coming-soon-overlay{background:rgba(15,20,16,.45)}
    .coming-soon-checklist{margin-top:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)}
    .check-item{display:flex;align-items:center;gap:7px;font-size:12px;padding:4px 0}
    .check-item.done{color:var(--success)}.check-item.pending{color:var(--text3)}
    .platform-connect-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:#010101;color:#fff;border:none;cursor:pointer;transition:opacity .15s;letter-spacing:.2px}
    .platform-connect-btn:hover{opacity:.82}
    .platform-connect-btn svg{width:13px;height:13px;flex-shrink:0}
    .platform-profile-card{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px}
    .platform-profile-left{display:flex;align-items:center;gap:10px}
    .platform-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0}
    .platform-avatar-placeholder{display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
    .platform-display-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
    .platform-handle{font-size:11px;color:var(--text3)}
    .main-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
    .main-tab{padding:7px 18px;font-size:12px;font-weight:600;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
    .main-tab:hover:not([style*="color:#"]){color:var(--text2)}
    .sub-tabs{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .sub-tab{padding:4px 14px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
    .range-wrap{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
    .range-btn{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;transition:all .15s}
    .range-btn.active{background:var(--surface2);border-color:var(--text2);color:var(--text)}
    .range-btn:hover:not(.active){border-color:var(--text2);color:var(--text2)}
    .chart-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 8px 6px;overflow:hidden}
    .metric-inner{display:flex;justify-content:space-between;align-items:flex-end;gap:6px}
    .metric-inner svg{flex-shrink:0;align-self:flex-end}
    .top-video-card{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-left:3px solid #00C2A8;border-radius:var(--radius);padding:12px;margin-bottom:14px}
    .top-video-badge{display:inline-block;font-size:10px;font-weight:700;background:#00C2A8;color:#fff;padding:2px 8px;border-radius:10px;margin-bottom:6px}
    .vt-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .vt-row:last-child{border-bottom:none}
    .vt-thumb{width:32px;height:44px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
    .vt-meta{flex:1;min-width:0}
    .vt-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .vt-stats{display:flex;gap:8px;font-size:10px;color:var(--text3);margin-bottom:4px;flex-wrap:wrap}
    .vt-bar-wrap{height:3px;background:var(--border);border-radius:2px}
    .vt-bar{height:3px;border-radius:2px;transition:width .3s}
    .vt-date{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
    .platform-error-state{padding:12px 14px;font-size:12px;color:var(--danger);background:var(--surface2);border:1px solid var(--danger);border-radius:var(--radius);margin-top:8px}
    .loader-wrap{padding:60px 20px;text-align:center}
    .loader-spinner{width:36px;height:36px;margin:0 auto 14px;border:3px solid var(--border);border-top-color:#00C2A8;border-radius:50%;animation:ttSpin .75s linear infinite}
    .loader-msg{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px}
    .loader-sub{font-size:11px;color:var(--text3)}
    [data-tooltip]{position:relative}
    [data-tooltip]::before{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(15,15,15,.92);color:#fff;font-size:10px;line-height:1.5;padding:6px 10px;border-radius:6px;width:180px;text-align:center;pointer-events:none;opacity:0;transition:opacity .18s;z-index:300;white-space:normal;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    [data-tooltip]::after{content:'';position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(15,15,15,.92);pointer-events:none;opacity:0;transition:opacity .18s;z-index:300}
    [data-tooltip]:hover::before,[data-tooltip]:hover::after{opacity:1}
    body.dark [data-tooltip]::before{background:rgba(50,50,50,.97)}
    body.dark [data-tooltip]::after{border-top-color:rgba(50,50,50,.97)}
    .social-top-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:20px}
    .social-top-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .social-top-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
    .social-platforms-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media(max-width:600px){.social-platforms-row{grid-template-columns:1fr}}
    .social-platform-cell{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}
    .social-platform-cell.coming-soon-cell{opacity:.55}
    .social-cell-badge{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0}
    .social-cell-name{font-size:11px;color:var(--text3);margin-bottom:2px}
    .social-cell-val{font-size:18px;font-weight:700;color:var(--text);line-height:1}
    .social-cell-sub{font-size:10px;color:var(--text3);margin-top:1px}
    .site-footer{border-top:1px solid var(--border);padding:24px 16px;text-align:center;background:var(--surface);margin-top:40px}
    .site-footer p{font-size:12px;color:var(--text3);margin-bottom:8px}
    .site-footer a{color:var(--text2);font-size:12px;margin:0 10px;text-decoration:underline;text-underline-offset:3px}
    .site-footer a:hover{color:var(--accent)}
  </style>
</head>
<body>

    <div class="time-display" id="time-display">—</div>
    <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode">🌙</button>
  </div>
</header>

<main class="content">
  <div id="analytics-root"></div>
</main>

<footer class="site-footer">

<script>
// ─── DARK MODE ────────────────────────────────────────────────────
;(function(){const s=localStorage.getItem('bma_dark');if(s==='1')document.body.classList.add('dark')})()
function toggleDark(){const d=document.body.classList.toggle('dark');localStorage.setItem('bma_dark',d?'1':'0');document.getElementById('dark-toggle').textContent=d?'&#9728;&#65039;':'&#127769;'}
document.getElementById('dark-toggle').addEventListener('click',toggleDark)
;(function(){if(document.body.classList.contains('dark'))document.getElementById('dark-toggle').textContent='&#9728;&#65039;'})()

// ─── TIME ─────────────────────────────────────────────────────────
function updateTime(){const el=document.getElementById('time-display');if(!el)return;const now=new Date(),pht=new Date(now.getTime()+now.getTimezoneOffset()*60000+8*3600000);el.textContent=pht.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' PHT'}
updateTime();setInterval(updateTime,1000)

// ─── CONFIG ───────────────────────────────────────────────────────
const TT_CLIENT_KEY='sbawiohwdjglaeadzv'
const TT_REDIRECT_URI='https://anthonyyybm.github.io/Boosted-Movers-Analytics/'
const TT_TOKEN_PROXY='https://bmtbzcnrlojacvafyrxi.supabase.co/functions/v1/tiktok-token-exchange'
const TT_API_BASE='https://open.tiktokapis.com/v2'
const YOUTUBE_API_KEY='%%YOUTUBE_API_KEY%%'
const YOUTUBE_CHANNEL_ID='%%YOUTUBE_CHANNEL_ID%%'
const PLATFORMS={instagram:{name:'Instagram',abbr:'IG',color:'#E1306C'},youtube:{name:'YouTube',abbr:'YT',color:'#FF0000'},tiktok:{name:'TikTok',abbr:'TT',color:'#00C2A8'}}

// ─── STATIC FALLBACK DATA ─────────────────────────────────────────
const analyticsData={week_label:'W3 April',last_updated:'April 15, 2026',platforms:{
  instagram:{followers:1362,followers_change:2.0,avg_views:580,avg_views_change:11.5,posts_this_week:3,posts_change:-25.0,engagement_rate:3.3,engagement_change:6.5,weekly_data:{followers:[1280,1295,1310,1325,1340,1352,1362],views:[420,380,510,490,530,560,580]},goals:[{label:'3 reels with 1,000+ views',current:1,target:3}]},
  youtube:{subscribers:122,subscribers_change:6.1,avg_views:385,avg_views_change:13.2,videos_this_week:2,videos_change:-33.3,engagement_rate:2.7,engagement_change:8.0,weekly_data:{subscribers:[98,103,108,112,116,119,122],views:[290,310,340,355,360,372,385]},goals:[{label:'3 videos with 1,000+ views',current:0,target:3}]},
  tiktok:{followers:34,followers_change:9.7,avg_views:750,avg_views_change:8.7,videos_this_week:4,videos_change:-20.0,engagement_rate:4.6,engagement_change:4.5,weekly_data:{followers:[22,24,27,29,31,33,34],views:[580,610,650,690,710,730,750]},goals:[{label:'50 followers',current:34,target:50}]}
}}

// ─── STATE ────────────────────────────────────────────────────────
let ytDataStatus='default',ttDataStatus='default',lastRefreshedTime=null
let ttOAuthToken=localStorage.getItem('tt_access_token')||null
let tiktokLiveData={user:null,videos:[],error:null}
let youtubeLiveData={channel:null,videos:[],error:null}
function curMonth(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`}
const pState={
  tt:{activeTab:'last5',mainTab:'overview',chartMetric:'views',chartRange:'all',videoPage:0,monthFilter:curMonth()},
  yt:{activeTab:'last5',mainTab:'overview',chartMetric:'views',chartRange:'all',videoPage:0,monthFilter:curMonth()}
}

// ─── GENERIC HELPERS ──────────────────────────────────────────────
function fmtNum(n){if(n===null||n===undefined)return'--';if(typeof n!=='number')return String(n);if(n>=1000)return(n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,'')+' K';return String(n)}
function changeEl(v){if(v===null||v===undefined)return'<div class="a-chg-nil">vs last week</div>';const pos=v>=0;return`<div class="${pos?'a-chg-pos':'a-chg-neg'}">${pos?'&uarr;':'&darr;'} ${pos?'+':''}${Math.abs(v).toFixed(1)}%</div>`}
function sparklineSVG(data,color){if(!data||data.length<2)return'<div style="width:80px;height:40px"></div>';const W=80,H=40,P=3,lo=Math.min(...data),hi=Math.max(...data),rng=hi-lo||1;const pts=data.map((v,i)=>[P+(i/(data.length-1))*(W-P*2),H-P-((v-lo)/rng)*(H-P*2)]);let line=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;for(let i=1;i<pts.length;i++){const cx=((pts[i-1][0]+pts[i][0])/2).toFixed(1);line+=` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`}const area=`${line} L${pts[pts.length-1][0].toFixed(1)},${H} L${pts[0][0].toFixed(1)},${H}Z`;return`<svg width="80" height="40" viewBox="0 0 80 40" style="display:block"><path d="${area}" fill="${color}" fill-opacity="0.18"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`}
function skeletonVal(){return'<div class="skeleton" style="height:1.6rem;width:55%;margin:6px 0 4px"></div>'}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtN(n){if(!n&&n!==0)return'--';const v=Number(n);if(v>=1000000)return(v/1000000).toFixed(1).replace(/\.0$/,'')+'M';if(v>=1000)return(v/1000).toFixed(1).replace(/\.0$/,'')+'K';return String(v)}
function fmtDate(ts){if(!ts)return'';const d=new Date(Number(ts)*1000);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function updateFollowerHistory(count){const today=new Date().toISOString().split('T')[0];let h=JSON.parse(localStorage.getItem('tt_follower_history')||'[]');const last=h[h.length-1];if(!last||last.date!==today){h.push({date:today,count:Number(count)||0});if(h.length>60)h=h.slice(-60);localStorage.setItem('tt_follower_history',JSON.stringify(h))}return h}
function getFollowerHistory(){return JSON.parse(localStorage.getItem('tt_follower_history')||'[]')}

// ─── CHART HELPERS ────────────────────────────────────────────────
function groupByMonth(videos){const map={};videos.forEach(v=>{if(!v.create_time)return;const d=new Date(Number(v.create_time)*1000),key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,lbl=d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});if(!map[key])map[key]={key,label:lbl,videos:[],views:0,likes:0,comments:0,count:0};map[key].videos.push(v);map[key].views+=v.view_count||0;map[key].likes+=v.like_count||0;map[key].comments+=v.comment_count||0;map[key].count+=1});return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key))}
function miniSparkline(values,color,w=72,h=32){if(!values||values.length<2)return`<div style="width:${w}px;height:${h}px"></div>`;const lo=0,hi=Math.max(...values,1),P=2,pts=values.map((v,i)=>[P+(i/(values.length-1))*(w-P*2),P+(1-v/hi)*(h-P*2)]);let line=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;for(let i=1;i<pts.length;i++){const cx=((pts[i-1][0]+pts[i][0])/2).toFixed(1);line+=` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`}const area=`${line} L${pts[pts.length-1][0].toFixed(1)},${h} L${pts[0][0].toFixed(1)},${h}Z`;return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;flex-shrink:0"><path d="${area}" fill="${color}" fill-opacity="0.15"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/><circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="2.5" fill="${color}"/></svg>`}
function groupByDay(videos,filterMonth){const map={};videos.forEach(v=>{if(!v.create_time)return;const d=new Date(Number(v.create_time)*1000),mKey=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(filterMonth&&mKey!==filterMonth)return;const key=d.toISOString().split('T')[0],lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});if(!map[key])map[key]={key,label:lbl,views:0,likes:0,comments:0,count:0};map[key].views+=v.view_count||0;map[key].likes+=v.like_count||0;map[key].comments+=v.comment_count||0;map[key].count+=1});return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key))}
function enrichData(data){return data.map(m=>({...m,avg:m.count?Math.round(m.views/m.count):0,eng:m.views>0?+((m.likes+m.comments)/m.views*100).toFixed(2):0}))}
function getChartData(videos,range){const now=new Date();if(range==='month'){const cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;return enrichData(groupByDay(videos,cm))}const byM=groupByMonth(videos);if(range==='all')return enrichData(byM);const n=range==='6m'?6:3,cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-n);const ck=`${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}`;return enrichData(byM.filter(m=>m.key>=ck))}
function renderLineChart(data,valueKey,color){if(!data||data.length<2)return'<div style="padding:20px;text-align:center;font-size:11px;color:var(--text3)">Not enough data for this range.</div>';const W=500,H=80,PL=24,PR=4,PT=6,PB=16,vals=data.map(m=>m[valueKey]||0),hi=Math.max(...vals,1),cw=W-PL-PR,ch=H-PT-PB;const pts=data.map((m,i)=>[PL+(i/(data.length-1))*cw,PT+(1-(m[valueKey]||0)/hi)*ch]);let line=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;for(let i=1;i<pts.length;i++){const cx=((pts[i-1][0]+pts[i][0])/2).toFixed(1);line+=` C${cx},${pts[i-1][1].toFixed(1)} ${cx},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`}const area=`${line} L${pts[pts.length-1][0].toFixed(1)},${H-PB} L${pts[0][0].toFixed(1)},${H-PB}Z`;const xLbl=data.map((m,i)=>`<text x="${pts[i][0].toFixed(1)}" y="${H-PB+11}" text-anchor="middle" font-size="5" fill="var(--text3)" font-family="system-ui">${m.label}</text>`).join('');const yTk=[0,.5,1].map(t=>{const y=(PT+(1-t)*ch).toFixed(1),v=Math.round(hi*t),lbl=v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(1)+'K':String(v);return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/><text x="${PL-3}" y="${(+y+2).toFixed(1)}" text-anchor="end" font-size="5" fill="var(--text3)" font-family="system-ui">${lbl}</text>`}).join('');const dots=pts.map((pt,i)=>{const v=data[i][valueKey]||0,fv=valueKey==='eng'?v.toFixed(2)+'%':(v>=1000?(v/1000).toFixed(1)+'K':String(v)),tip=(data[i].label+': '+fv).replace(/'/g,"&#39;");return`<g onmouseover="showChartTip(event,'${tip}')" onmouseout="hideChartTip()" style="cursor:pointer"><circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="7" fill="transparent"/><circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="2.5" fill="${color}" stroke="var(--surface2)" stroke-width="1.5"/></g>`}).join('');return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">${yTk}<path d="${area}" fill="${color}" fill-opacity="0.1"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>${dots}${xLbl}</svg>`}
function genInsight(data,valueKey){if(!data||data.length<2)return'';const vals=data.map(m=>m[valueKey]||0),n=vals.length,first=vals[0],last=vals[n-1],maxVal=Math.max(...vals),maxIdx=vals.lastIndexOf(maxVal),avg=vals.reduce((a,b)=>a+b,0)/n,oPct=first>0?Math.round((last-first)/first*100):0,isEng=valueKey==='eng',fmt=v=>isEng?v.toFixed(1)+'%':(v>=1000?(v/1000).toFixed(1)+'K':String(Math.round(v))),rUp=n>=2&&last>vals[n-2]*1.15,rDown=n>=2&&last<vals[n-2]*0.85;let t='';if(oPct>=50){t=`Strong growth -- up ${oPct}% from ${data[0].label} to ${data[n-1].label}.`;if(rDown)t+=' Momentum slowing.'}else if(oPct>=15){t=`Gradual growth of ${oPct}% over this period.`;if(rUp)t+=' Accelerating recently.'}else if(oPct<=-15){t=`Declining trend, down ${Math.abs(oPct)}%.`;if(rUp)t+=' Latest period shows recovery.'}else{t=`Stable -- ${oPct>=0?'up '+oPct:'down '+Math.abs(oPct)}% overall.`}if(maxVal>avg*1.5&&!t.includes(data[maxIdx].label))t+=` Best: ${data[maxIdx].label} (${fmt(maxVal)}).`;return t}

function renderVideoTableRows(videos,allVideos,c){
  if(!videos||!videos.length)return'<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">No videos found</div>'
  const mx=Math.max(...allVideos.map(v=>v.view_count||0),1)
  return videos.map(v=>{const title=escH(v.title||v.video_description||'(No title)'),bp=Math.round(((v.view_count||0)/mx)*100),thumb=v.cover_image_url?`<img src="${escH(v.cover_image_url)}" class="vt-thumb" alt="">`:`<div class="vt-thumb" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">&#9654;</div>`;return`<div class="vt-row">${thumb}<div class="vt-meta"><div class="vt-title" title="${title}">${title}</div><div class="vt-stats"><span>&#128065; ${fmtN(v.view_count)}</span><span>&#10084; ${fmtN(v.like_count)}</span><span>&#128172; ${fmtN(v.comment_count)}</span></div><div class="vt-bar-wrap"><div class="vt-bar" style="width:${bp}%;background:${c||'#00C2A8'}"></div></div></div><div class="vt-date">${fmtDate(v.create_time)}</div></div>`}).join('')
}
function renderPaginatedTable(pfx,pool,all,page,ps,c){
  const tp=Math.ceil(pool.length/ps),rows=renderVideoTableRows(pool.slice(page*ps,(page+1)*ps),all,c)
  if(tp<=1)return rows
  return`${rows}<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)"><button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setVideoPage('${pfx}',${page-1})"${page===0?' disabled':''}>&#8592; Prev</button><span style="font-size:11px;color:var(--text3)">Page ${page+1} of ${tp} &middot; ${pool.length} videos</span><button class="refresh-btn" style="font-size:11px;padding:3px 10px" onclick="setVideoPage('${pfx}',${page+1})"${page>=tp-1?' disabled':''}>Next &#8594;</button></div>`
}

  if(!md||!md.videos.length){card=`<div style="padding:14px;text-align:center;font-size:12px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)">No videos posted this month</div>`}
  else{const top=md.videos.reduce((a,b)=>(b.view_count||0)>(a.view_count||0)?b:a),thumb=top.cover_image_url?`<img src="${escH(top.cover_image_url)}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)" alt="">`:`<div style="width:56px;height:78px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:var(--text3)">&#9654;</div>`;card=`<div class="top-video-card" style="border-left-color:${c||'#00C2A8'}">${thumb}<div style="flex:1;min-width:0"><div class="top-video-badge" style="background:${c||'#00C2A8'}">&#127942; Top Video &mdash; ${md.label}</div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px;line-height:1.4">${escH(top.title||top.video_description||'(No title)')}</div><div style="display:flex;gap:12px;flex-wrap:wrap"><span style="font-size:11px;color:var(--text2)">&#128065; <strong>${fmtN(top.view_count)}</strong></span><span style="font-size:11px;color:var(--text2)">&#10084; <strong>${fmtN(top.like_count)}</strong></span><span style="font-size:11px;color:var(--text2)">&#128172; <strong>${fmtN(top.comment_count)}</strong></span>${top.create_time?`<span style="font-size:11px;color:var(--text3)">${fmtDate(top.create_time)}</span>`:''}</div></div></div>`}
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:700">&#127942; Top Video of the Month</div><select onchange="setMonthFilter('${pfx}',this.value)" style="font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);cursor:pointer;outline:none">${opts}</select></div>${card}`

// ─── METRIC CARD AND GOALS ────────────────────────────────────────
function metricCard(label,value,change,sparkData,color,isLoading){const spark=sparkData?sparklineSVG(sparkData,color):'<div style="width:80px;height:40px"></div>';const display=isLoading?skeletonVal():(typeof value==='string'?value:fmtNum(value));const chg=isLoading?'<div class="a-chg-nil">loading...</div>':changeEl(change);return`<div class="a-metric${isLoading?'':' metric-fade-in'}"><div class="metric-label">${label}</div><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px"><div><div class="metric-val">${display}</div>${chg}</div><div style="flex-shrink:0;margin-left:8px;align-self:flex-end">${isLoading?'':spark}</div></div></div>`}
function goalsCard(goals,color){return`<div class="goals-card"><div class="card-title">APRIL GOALS</div>${goals.map(g=>{const p=Math.min(100,Math.round((g.current/g.target)*100));return`<div class="goals-row"><div class="goals-meta"><span class="goals-label">${g.label}</span><span class="goals-progress">${g.current}/${g.target} (${p}%)</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${p}%;background:${color}"></div></div></div>`}).join('')}</div>`}

// ─── TIKTOK BLOCK ─────────────────────────────────────────────────
function tiktokBlock(isLoading){
  const cfg=PLATFORMS.tiktok,d=analyticsData.platforms.tiktok,c=cfg.color,connected=!!ttOAuthToken&&!!tiktokLiveData.user
  if(connected&&!isLoading){
    const user=tiktokLiveData.user,videos=tiktokLiveData.videos,byM=groupByMonth(videos),s=pState.tt
    const av=user.avatar_url?`<img src="${escH(user.avatar_url)}" class="platform-avatar" alt="">`:`<div class="platform-avatar platform-avatar-placeholder" style="background:${c};width:48px;height:48px;border-radius:50%">TT</div>`
    const err=tiktokLiveData.error?`<div class="platform-error-state">&#9888; ${escH(tiktokLiveData.error)}</div>`:''
    const mc=s.mainTab==='trends'?renderTrendsTab('tt',videos,c):renderOverviewContent('tt',user,videos,c,false)

  }
  const oBtn=isLoading?'':`<button class="platform-connect-btn" style="margin-left:auto" onclick="startTikTokOAuth()"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M34.1 7C33.3 10.4 30 13 26.5 13.2V19.8C29.3 19.6 31.8 18.6 33.8 17v10.3C33.8 33.8 28.6 39 22.1 39c-6.5 0-11.7-5.2-11.7-11.7 0-6.3 5-11.4 11.2-11.7v6.6c-2.8.3-5 2.6-5 5.2 0 2.9 2.3 5.2 5.2 5.2 3 0 5.5-2.5 5.5-5.5V7h6.8z" fill="white"/></svg>Connect TikTok</button>`
  return`<div class="platform-section"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap"><div class="platform-badge" style="background:${c}">${cfg.abbr}</div><span style="font-size:17px;font-weight:700;color:var(--text)">${cfg.name}</span>${oBtn}</div><div class="ag3">${metricCard('FOLLOWERS',d.followers,d.followers_change,d.weekly_data.followers,c,isLoading)}${metricCard('AVG VIEWS',d.avg_views,d.avg_views_change,d.weekly_data.views,c,isLoading)}${metricCard('VIDEOS POSTED',d.videos_this_week,d.videos_change,null,c,isLoading)}</div><div class="ag3" style="margin-bottom:14px">${metricCard('ENGAGEMENT RATE',d.engagement_rate+'%',d.engagement_change,null,c,isLoading)}</div>${goalsCard(d.goals,c)}</div>`
}

// ─── YOUTUBE BLOCK ────────────────────────────────────────────────

    const err=youtubeLiveData.error?`<div class="platform-error-state">&#9888; ${escH(youtubeLiveData.error)}</div>`:''
    const mc=s.mainTab==='trends'?renderTrendsTab('yt',videos,c):renderOverviewContent('yt',ch,videos,c,true)
    return`<div class="platform-section">${err}<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap"><div class="platform-badge" style="background:${c}">${cfg.abbr}</div><span style="font-size:17px;font-weight:700;color:var(--text)">${cfg.name}</span><span class="data-badge-live" style="margin-left:0">&#9679; Live API</span></div><div class="platform-profile-card"><div class="platform-profile-left">${av}<div><div class="platform-display-name">${escH(ch.display_name||'YouTube Channel')}</div><div class="platform-handle">${videos.length} videos fetched &middot; ${byM.length} month${byM.length!==1?'s':''} of data</div></div></div></div><div class="main-tabs"><button class="main-tab" data-yt-tab="overview" onclick="switchMainTab('yt','overview')" style="${s.mainTab==='overview'?`color:${c};border-bottom-color:${c}`:''}">Overview</button><button class="main-tab" data-yt-tab="trends" onclick="switchMainTab('yt','trends')" style="${s.mainTab==='trends'?`color:${c};border-bottom-color:${c}`:''}">&#128200; Trends</button></div><div id="yt-main-content">${mc}</div></div>`
  }
  let sb=''
  if(!isLoading){if(ytDataStatus==='live')sb='<span class="data-badge-live">&#9679; Live</span>';else if(ytDataStatus==='cached')sb='<span class="data-badge-cached">Using cached data</span>'}
  return`<div class="platform-section"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="platform-badge" style="background:${c}">${cfg.abbr}</div><span style="font-size:17px;font-weight:700;color:var(--text)">${cfg.name}</span>${sb}</div><div class="ag3">${metricCard('SUBSCRIBERS',d.subscribers,d.subscribers_change,d.weekly_data.subscribers,c,isLoading)}${metricCard('AVG VIEWS',d.avg_views,d.avg_views_change,d.weekly_data.views,c,isLoading)}${metricCard('VIDEOS POSTED',d.videos_this_week,d.videos_change,null,c,isLoading)}</div><div class="ag3" style="margin-bottom:14px">${metricCard('ENGAGEMENT RATE',d.engagement_rate+'%',d.engagement_change,null,c,isLoading)}</div>${goalsCard(d.goals,c)}</div>`
}

// ─── INSTAGRAM BLOCK ──────────────────────────────────────────────
function instagramBlock(isLoading){
  const cfg=PLATFORMS.instagram,c=cfg.color
  return`<div class="platform-section coming-soon-section" style="position:relative"><div class="coming-soon-overlay"></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="platform-badge" style="background:${c}">${cfg.abbr}</div><span style="font-size:17px;font-weight:700;color:var(--text)">${cfg.name}</span><span class="coming-soon-badge">Coming Soon</span></div><div class="ag3">${metricCard('FOLLOWERS','--',null,null,c,false)}${metricCard('AVG VIEWS','--',null,null,c,false)}${metricCard('REELS POSTED','--',null,null,c,false)}</div><div class="coming-soon-checklist"><div class="card-title" style="margin-bottom:8px">SETUP PROGRESS</div><div class="check-item done">&#9989; Meta Business Suite connected</div><div class="check-item done">&#9989; Facebook account setup</div><div class="check-item pending">&#11036; Developer app approval</div><div class="check-item pending">&#11036; API tokens generated</div><div class="check-item pending">&#11036; Live data connected</div></div></div>`
}

// ─── SOCIAL TOP CARD ──────────────────────────────────────────────
function socialTopCard(isLoading){
  const yt=analyticsData.platforms.youtube,tt=analyticsData.platforms.tiktok
  const ytV=youtubeLiveData.channel?fmtNum(youtubeLiveData.channel.follower_count||youtubeLiveData.channel.subscriber_count||0):fmtNum(yt.subscribers)
  const ttV=tiktokLiveData.user?fmtNum(tiktokLiveData.user.follower_count):fmtNum(tt.followers)
  return`<div class="social-top-card"><div class="social-top-header"><span class="social-top-title">Social Media Overview</span><span class="last-refreshed" id="last-refreshed-inline">${lastRefreshedTime?'Updated '+lastRefreshedTime:''}</span></div><div class="social-platforms-row"><div class="social-platform-cell coming-soon-cell"><div class="social-cell-badge" style="background:#E1306C">IG</div><div><div class="social-cell-name">Instagram</div><div class="social-cell-val">--</div><div class="social-cell-sub">Coming Soon</div></div></div><div class="social-platform-cell"><div class="social-cell-badge" style="background:#FF0000">YT</div><div><div class="social-cell-name">YouTube</div><div class="social-cell-val">${isLoading?'<div class="skeleton" style="height:1.2rem;width:50px"></div>':ytV}</div><div class="social-cell-sub">subscribers${youtubeLiveData.channel?' &middot; live':''}</div></div></div><div class="social-platform-cell"><div class="social-cell-badge" style="background:#00C2A8">TT</div><div><div class="social-cell-name">TikTok</div><div class="social-cell-val">${isLoading?'<div class="skeleton" style="height:1.2rem;width:50px"></div>':ttV}</div><div class="social-cell-sub">followers${tiktokLiveData.user?' &middot; live':''}</div></div></div></div></div>`
}

// ─── RENDER DASHBOARD ─────────────────────────────────────────────
function renderDashboard(isLoading){
  const d=analyticsData
  document.getElementById('analytics-root').innerHTML=`
    <div class="analytics-header">
      <div><div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px">Social Media Analytics</div><div style="font-size:13px;color:var(--text2)">Weekly Review &mdash; ${d.week_label} &nbsp;&middot;&nbsp; Updated ${d.last_updated}</div></div>
      <div class="analytics-header-right"><span class="last-refreshed" id="last-refreshed-label">${lastRefreshedTime?'Last fetched: '+lastRefreshedTime:''}</span><button class="refresh-btn" onclick="refreshAnalytics()" id="refresh-btn"><span class="refresh-icon">&#8635;</span> Refresh</button></div>
    </div>
    ${socialTopCard(isLoading)}
    <div class="card" style="margin-bottom:20px">
      <div class="card-title" style="margin-bottom:14px">PLATFORM BREAKDOWN</div>
      ${youtubeBlock(isLoading)}
      ${tiktokBlock(isLoading)}
      ${instagramBlock(isLoading)}
    </div>
    <div class="metrics-grid" style="margin-bottom:28px">${summaryCfgCards()}</div>`
}
function summaryCfgCards(){
  const d=analyticsData,ig=d.platforms.instagram,yt=d.platforms.youtube,tt=d.platforms.tiktok
  const ytS=youtubeLiveData.channel?.follower_count??yt.subscribers,ttF=tiktokLiveData.user?.follower_count??tt.followers
  const bp=[{name:'Instagram',eng:ig.engagement_rate},{name:'YouTube',eng:yt.engagement_rate},{name:'TikTok',eng:tt.engagement_rate}].reduce((a,b)=>b.eng>a.eng?b:a)
  return[{label:'TOTAL FOLLOWERS',value:(ig.followers+ytS+ttF).toLocaleString(),sub:'all platforms combined',bc:'var(--accent)'},{label:'CONTENT PUBLISHED',value:String(ig.posts_this_week+yt.videos_this_week+tt.videos_this_week),sub:'posts this week',bc:'#1d4ed8'},{label:'BEST PLATFORM',value:bp.name,sub:bp.eng+'% engagement',bc:'#00C2A8'},{label:'WEEK',value:d.week_label,sub:'current review period',bc:'var(--amber)'}].map(c=>`<div class="summary-card" style="border-left:3px solid ${c.bc}"><div class="metric-label">${c.label}</div><div class="metric-val" style="margin-top:4px">${c.value}</div><div class="metric-sub">${c.sub}</div></div>`).join('')
}
function updateLastRefreshed(){const now=new Date(),pht=new Date(now.getTime()+now.getTimezoneOffset()*60000+8*3600000);lastRefreshedTime=pht.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' PHT';const e1=document.getElementById('last-refreshed-label'),e2=document.getElementById('last-refreshed-inline');if(e1)e1.textContent='Last fetched: '+lastRefreshedTime;if(e2)e2.textContent='Updated '+lastRefreshedTime}
function showLoadingState(){renderDashboard(true);const btn=document.getElementById('refresh-btn');if(btn)btn.classList.add('spinning')}

// ─── TIKTOK OAUTH ─────────────────────────────────────────────────
function startTikTokOAuth(){const state=crypto.randomUUID();sessionStorage.setItem('tt_state',state);const p=new URLSearchParams({client_key:TT_CLIENT_KEY,scope:'user.info.basic,user.info.stats,video.list',response_type:'code',redirect_uri:TT_REDIRECT_URI,state});window.location.href=`https://www.tiktok.com/v2/auth/authorize/?${p}`}
window.startTikTokOAuth=startTikTokOAuth
function disconnectTikTok(){localStorage.removeItem('tt_access_token');localStorage.removeItem('tt_state');ttOAuthToken=null;tiktokLiveData={user:null,videos:[],error:null};pState.tt={activeTab:'last5',mainTab:'overview',chartMetric:'views',chartRange:'all',videoPage:0,monthFilter:curMonth()};renderDashboard(false)}
window.disconnectTikTok=disconnectTikTok
async function exchangeTikTokCode(code){const r=await fetch(TT_TOKEN_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,redirect_uri:TT_REDIRECT_URI})});if(!r.ok){const t=await r.text().catch(()=>r.statusText);throw new Error(`Token exchange failed (${r.status}): ${t}`)}const data=await r.json();if(data.error)throw new Error(`${data.error}: ${data.detail||''}`);return data}
async function fetchTikTokUserInfo(token){const f='open_id,display_name,avatar_url,follower_count,following_count,likes_count,video_count',r=await fetch(`${TT_API_BASE}/user/info/?fields=${f}`,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)throw new Error(`User info failed (${r.status})`);return(await r.json()).data?.user||{}}
async function fetchAllTikTokVideos(token){const f='id,title,video_description,cover_image_url,view_count,like_count,comment_count,create_time',h={Authorization:`Bearer ${token}`,'Content-Type':'application/json'};let all=[],cursor=0,hasMore=true;while(hasMore){const r=await fetch(`${TT_API_BASE}/video/list/?fields=${f}`,{method:'POST',headers:h,body:JSON.stringify({max_count:20,cursor})});if(!r.ok)throw new Error(`Video list failed (${r.status})`);const data=await r.json();if(data.error&&data.error.code!=='ok')throw new Error(data.error.message);const p=data.data?.videos||[];all=all.concat(p);hasMore=data.data?.has_more===true;cursor=data.data?.cursor||0;const el=document.getElementById('tt-loading-msg');if(el)el.textContent=`Loading TikTok analytics... ${all.length} videos`;if(!hasMore||!p.length)break}return all.sort((a,b)=>(b.create_time||0)-(a.create_time||0))}
async function handleTikTokCallback(code){try{const td=await exchangeTikTokCode(code);if(!td.access_token)throw new Error('No access_token');const[user,vids]=await Promise.all([fetchTikTokUserInfo(td.access_token),fetchAllTikTokVideos(td.access_token)]);localStorage.setItem('tt_access_token',td.access_token);ttOAuthToken=td.access_token;updateFollowerHistory(user.follower_count);tiktokLiveData.user=user;tiktokLiveData.videos=vids;tiktokLiveData.error=null}catch(err){console.error('TikTok callback:',err);localStorage.removeItem('tt_access_token');ttOAuthToken=null;tiktokLiveData.error=err.message}}
async function loadTikTokFromSession(){if(!ttOAuthToken)return;try{const[user,vids]=await Promise.all([fetchTikTokUserInfo(ttOAuthToken),fetchAllTikTokVideos(ttOAuthToken)]);updateFollowerHistory(user.follower_count);tiktokLiveData.user=user;tiktokLiveData.videos=vids;tiktokLiveData.error=null}catch(err){console.error('TikTok session:',err);localStorage.removeItem('tt_access_token');ttOAuthToken=null;tiktokLiveData.error=err.message}}

// ─── YOUTUBE API ──────────────────────────────────────────────────
async function fetchYouTubeData(){
  if(!YOUTUBE_API_KEY||YOUTUBE_API_KEY.startsWith('%%'))return{success:false}
  try{
    const[chRes,srRes]=await Promise.all([
      fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${YOUTUBE_CHANNEL_ID}&key=${YOUTUBE_API_KEY}`),
      fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${YOUTUBE_CHANNEL_ID}&type=video&order=date&maxResults=50&key=${YOUTUBE_API_KEY}`)
    ])
    const chData=await chRes.json()
    if(!chData.items?.length)throw new Error('Channel not found')
    const ch=chData.items[0],srData=await srRes.json()
    const ids=(srData.items||[]).map(v=>v.id.videoId).filter(Boolean).join(',')
    let videos=[]
    if(ids){const vRes=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${ids}&key=${YOUTUBE_API_KEY}`),vData=await vRes.json();videos=(vData.items||[]).map(v=>({id:v.id,title:v.snippet.title,cover_image_url:v.snippet.thumbnails?.medium?.url||v.snippet.thumbnails?.default?.url||null,view_count:parseInt(v.statistics.viewCount||0),like_count:parseInt(v.statistics.likeCount||0),comment_count:parseInt(v.statistics.commentCount||0),create_time:Math.floor(new Date(v.snippet.publishedAt).getTime()/1000)})).sort((a,b)=>b.create_time-a.create_time)}
    const sa=Date.now()/1000-7*86400,rc=videos.filter(v=>v.create_time>sa),tv=rc.reduce((s,v)=>s+v.view_count,0),tl=rc.reduce((s,v)=>s+v.like_count,0),tc=rc.reduce((s,v)=>s+v.comment_count,0)
    const channel={display_name:ch.snippet.title,avatar_url:ch.snippet.thumbnails?.default?.url||null,follower_count:parseInt(ch.statistics.subscriberCount||0),subscriber_count:parseInt(ch.statistics.subscriberCount||0),video_count:parseInt(ch.statistics.videoCount||0),view_count:parseInt(ch.statistics.viewCount||0)}
    return{success:true,channel,videos,subscribers:channel.follower_count,avg_views:rc.length?Math.round(tv/rc.length):0,videos_this_week:rc.length,engagement_rate:tv>0?parseFloat(((tl+tc)/tv*100).toFixed(1)):0}
  }catch(err){console.error('YouTube API:',err);return{success:false,error:err.message}}
}
async function applyYouTubeData(data){
  if(data.success){
    analyticsData.platforms.youtube.subscribers=data.subscribers
    analyticsData.platforms.youtube.avg_views=data.avg_views
    analyticsData.platforms.youtube.videos_this_week=data.videos_this_week
    analyticsData.platforms.youtube.engagement_rate=data.engagement_rate
    youtubeLiveData.channel=data.channel
    youtubeLiveData.videos=data.videos
    ytDataStatus='live'
  } else { ytDataStatus='cached' }
}
async function refreshAnalytics(){
  if(ttOAuthToken)await loadTikTokFromSession()
  showLoadingState()
  await applyYouTubeData(await fetchYouTubeData())
  if(ttOAuthToken&&tiktokLiveData.user?.follower_count!=null)analyticsData.platforms.tiktok.followers=tiktokLiveData.user.follower_count
  renderDashboard(false);updateLastRefreshed()
}
window.refreshAnalytics=refreshAnalytics

// ─── BOOT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',async()=>{
  renderDashboard(true)
  const urlP=new URLSearchParams(window.location.search),ttCode=urlP.get('code')
  if(ttCode){
    history.replaceState({},'',window.location.pathname)
    document.getElementById('analytics-root').innerHTML=`<div class="loader-wrap"><div class="loader-spinner"></div><div class="loader-msg" id="tt-loading-msg">Connecting to TikTok...</div><div class="loader-sub">Fetching all videos &mdash; this may take a moment</div></div>`
    await handleTikTokCallback(ttCode)
  } else if(ttOAuthToken){
    await loadTikTokFromSession()
  }
  showLoadingState()
  await applyYouTubeData(await fetchYouTubeData())
  if(ttOAuthToken&&tiktokLiveData.user?.follower_count!=null)analyticsData.platforms.tiktok.followers=tiktokLiveData.user.follower_count
  renderDashboard(false);updateLastRefreshed()
})
</script>
