<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — MoverMetrics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2322c55e'/><text y='.9em' font-size='48' font-family='system-ui' font-weight='800' fill='white' x='10' y='72'>MM</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-light: #0d2818;
      --danger: #f85149;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(34, 197, 94, 0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* BACK LINK */
    .back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
      z-index: 10;
    }
    .back-link:hover { color: var(--text); }

    /* BRAND */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: .5px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 16px 16px 0 0;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .card-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* FORM */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input::placeholder { color: var(--text3); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 8px;
      font-family: inherit;
      letter-spacing: -.2px;
    }

    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

    /* MESSAGES */
    .msg {
      display: none;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 16px;
    }

    .msg-error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.25);
      color: var(--danger);
    }

    .msg-success {
      background: var(--accent-light);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: var(--accent);
    }

    .msg.visible { display: block; }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text3);
      white-space: nowrap;
    }

    /* FOOTER LINK */
    .card-footer {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .back-link { top: 14px; left: 16px; }
    }
  </style>
</head>
<body>

  <a href="/MoverMetrics/" class="back-link">← MoverMetrics</a>

  <a href="/MoverMetrics/" class="brand">
    <div class="logo-mark">MM</div>
    <span class="brand-name">MoverMetrics</span>
  </a>

  <div class="card">
    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">Start tracking your social media performance</p>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@company.com"
          autocomplete="email"
          required
        >
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Minimum 6 characters"
          minlength="6"
          autocomplete="new-password"
          required
        >
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
    </form>

    <div class="msg msg-error" id="errorMsg"></div>
    <div class="msg msg-success" id="successMsg"></div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">already have an account?</span>
      <div class="divider-line"></div>
    </div>

    <div class="card-footer">
      <a href="/MoverMetrics/login/">Log In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://bmtbzcnrlojacvafyrxi.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdGJ6Y25ybG9qYWN2YWZ5cnhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDk0MDgsImV4cCI6MjA4OTc4NTQwOH0.wVJas9i0sx3oq3A4BNh2cw5iy4Xgxdb6JDA-68Tw_IQ'

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const form = document.getElementById('signupForm')
    const submitBtn = document.getElementById('submitBtn')
    const errorMsg = document.getElementById('errorMsg')
    const successMsg = document.getElementById('successMsg')

    function showError(text) {
      errorMsg.textContent = text
      errorMsg.classList.add('visible')
      successMsg.classList.remove('visible')
    }

    function showSuccess(text) {
      successMsg.textContent = text
      successMsg.classList.add('visible')
      errorMsg.classList.remove('visible')
    }

    function clearMessages() {
      errorMsg.classList.remove('visible')
      successMsg.classList.remove('visible')
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      clearMessages()

      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      if (!email) { showError('Please enter your email address.'); return }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return }

      submitBtn.disabled = true
      submitBtn.textContent = 'Creating account...'

      try {
        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: 'https://anthonyyybm.github.io/MoverMetrics/login/'
          }
        })

        if (error) {
          showError(error.message)
          return
        }

        // If session returned immediately (email confirmation disabled)
        if (data.session) {
          window.location.href = '/MoverMetrics/onboarding/'
          return
        }

        // Confirmation email sent
        showSuccess(`Check your email! We sent a confirmation link to ${email}. Click the link, then come back to log in.`)
        form.reset()

      } catch (err) {
        showError('Something went wrong. Please try again.')
      } finally {
        submitBtn.disabled = false
        submitBtn.textContent = 'Create Account'
      }
    })
  </script>
</body>
</html>
